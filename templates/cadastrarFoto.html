<!DOCTYPE html>
<html>

<head>
    <title>Cadastrar Rosto</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-mode.css') }}">
</head>

<body>

<h1>Cadastro de Funcionário</h1>

<input type="text" id="nome" placeholder="Digite o nome">

<br><br>

<button onclick="iniciarCamera()">Abrir Câmera</button>
<button id="btnCapturar" onclick="capturar()">Capturar Foto</button>

<br><br>

<video id="video" width="400" autoplay></video>

<br><br>

<script>

let stream;
const video = document.getElementById("video");

function iniciarCamera(){

    navigator.mediaDevices.getUserMedia({ video:true })
    .then(s => {

        stream = s;
        video.srcObject = stream;

    })
    .catch(err => {

        alert("Erro ao acessar câmera");
        console.error(err);

    });
}

    async function capturar() {

        const nome = document.getElementById("nome").value.trim();
        const btnCapturar = document.getElementById("btnCapturar");

        // 🚫 bloqueia se já estiver processando
        if (btnCapturar.disabled) return;

        if (!nome) {
            alert("Digite o nome");
            return;
        }

        // 🔒 bloqueia botão
        btnCapturar.disabled = true;
        btnCapturar.innerText = "Processando...";

        try {

            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0);

            const imagem = canvas.toDataURL("image/jpeg");

            const response = await fetch("/salvar_cadastro", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    nome: nome,
                    imagem: imagem
                })
            });

            const data = await response.json();

            alert(data.mensagem || data.erro);

        } catch (err) {

            console.error(err);
            alert("Erro ao cadastrar");

        } finally {

            // 🔓 libera botão
            btnCapturar.disabled = false;
            btnCapturar.innerText = "Capturar Foto";

        }

    }

</script>

</body>
</html>
