<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Biometria Facial - WorkSync</title>

    <!-- CSS Global (SEMPRE PRIMEIRO) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/worksync-global.css') }}">
    <!-- CSS Específico -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cadastroFoto.css') }}">

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="facial-page">

    <!-- Main Content -->
    <div class="facial-content">

        <!-- Camera Card -->
        <div class="card camera-card">
            <!-- Input de Nome -->
            <input type="text" id="nome" placeholder="Digite o nome">

            <!-- Camera Container -->
            <div class="camera-container">
                <video id="video" class="camera-video" autoplay playsinline></video>
                <div class="camera-placeholder">
                    <div class="camera-frame-guide"></div>
                    <p class="camera-status">Câmera desativada</p>
                </div>
            </div>

            <!-- Contador -->
            <p id="contador">Foto 0 de 5</p>

            <!-- Barra de Progresso -->
            <div class="barra">
                <div class="barra-preenchimento" id="barra"></div>
            </div>
        </div>

        <!-- Buttons (Fora do Card) -->
        <div class="button-container">
            <button class="btn-primary" id="btnCapturar" onclick="cadastrar()">Capturar Foto</button>
            <button class="btn-secondary" onclick="abrirInstrucoes()">Instruções</button>
        </div>

    </div>

</div>

<!-- Modal de Instruções -->
<div id="modal-instrucoes" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Instruções para Cadastro</h2>
            <button class="modal-close" onclick="fecharInstrucoes()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="instructions-list">
                <div class="instruction-item">
                    <div class="instruction-number">1</div>
                    <p>Posicione o rosto de frente para a câmera</p>
                </div>
                <div class="instruction-item">
                    <div class="instruction-number">2</div>
                    <p>Mantenha o rosto centralizado</p>
                </div>
                <div class="instruction-item">
                    <div class="instruction-number">3</div>
                    <p>Esteja em um ambiente com iluminação adequada</p>
                </div>
                <div class="instruction-item">
                    <div class="instruction-number">4</div>
                    <p>Não utilize acessórios que obstruam o rosto (boné, óculos, etc)</p>
                </div>
                <div class="instruction-item">
                    <div class="instruction-number">5</div>
                    <p>Permaneça imóvel durante a captura</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/cadastrarFoto.js') }}"></script>

</body>

</html>
