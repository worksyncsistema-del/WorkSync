<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Empresa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/worksync-global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cadastroEmpresas.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-mode.css') }}">

</head>

<body>

    <div class="container">

        <div class="card">
            <h2>Dados Gerais</h2>

            <label>CNPJ</label>
            <input type="text">

            <label>Razão Social</label>
            <input type="text">

            <label>Nome Fantasia</label>
            <input type="text">
        </div>

        <div class="card">
            <h2>Contato</h2>

            <label>Telefones</label>
            <div id="telefones"></div>
            <button class="btn btn-primary btn-add" onclick="addTelefone()">Adicionar mais um</button>

            <div class="mt">
                <label>E-mail</label>
                <div id="emails"></div>
                <button class="btn btn-primary btn-add" onclick="addEmail()">Adicionar mais um</button>
            </div>
        </div>

        <div class="card">
            <h2>Endereço</h2>

            <div class="grid-3">
                <div>
                    <label>Rua</label>
                    <input type="text">
                </div>
                <div>
                    <label>Nº</label>
                    <input type="text">
                </div>
                <div>
                    <label>Bairro</label>
                    <input type="text">
                </div>
            </div>

            <div class="grid-2 mt">
                <div>
                    <label>Cidade</label>
                    <input type="text">
                </div>
                <div>
                    <label>Estado</label>
                    <select>
                        <option>Selecione</option>
                        <option>AC</option>
                        <option>AL</option>
                        <option>AP</option>
                        <option>AM</option>
                        <option>BA</option>
                        <option>CE</option>
                        <option>DF</option>
                        <option>ES</option>
                        <option>GO</option>
                        <option>MA</option>
                        <option>MT</option>
                        <option>MS</option>
                        <option>MG</option>
                        <option>PA</option>
                        <option>PB</option>
                        <option>PR</option>
                        <option>PE</option>
                        <option>PI</option>
                        <option>RJ</option>
                        <option>RN</option>
                        <option>RS</option>
                        <option>RO</option>
                        <option>RR</option>
                        <option>SC</option>
                        <option>SP</option>
                        <option>SE</option>
                        <option>TO</option>
                    </select>
                </div>
            </div>

            <div class="grid-2 mt">
                <div>
                    <label>CEP</label>
                    <input type="text">
                </div>
                <div>
                    <label>Complemento</label>
                    <input type="text">
                </div>
            </div>
        </div>

        <button class="btn btn-primary full">Salvar Cadastro</button>

    </div>

    <script src="{{ url_for('static', filename='js/cadastroEmpresas.js') }}"></script>
</body>

</html>
