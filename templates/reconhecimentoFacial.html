<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconhecimento Facial - WorkSync</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/worksync-global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reconhecimentoFacial.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-mode.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="facial-page">
    <div class="facial-content">

        <!-- CAMERA -->
        <div class="card camera-card">
            <div class="camera-container">
                <video id="video" class="camera-video" autoplay playsinline></video>

                <div class="camera-placeholder">
                    <div class="camera-frame-guide"></div>
                    <p class="camera-status">Câmera desativada</p>
                </div>
            </div>
        </div>
        <!-- BOTÕES -->
        <div class="button-container">
            <button id="btnRegistrar" class="btn-primary" type="button">Bater Ponto</button>
            <button id="btnInstrucoes" class="btn-secondary" type="button">Instruções</button>
            <button class="btn-secondary" type="button" onclick="history.back()">Voltar</button>
        </div>

    </div>
</div>

<!-- MODAL -->
<div id="modal-instrucoes" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Instruções para Reconhecimento</h2>
            <button id="btnFecharModal" class="modal-close">&times;</button>
        </div>

        <div class="modal-body">
            <div class="instructions-list">
                <div class="instruction-item"><div class="instruction-number">1</div><p>Rosto próximo à câmera</p></div>
                <div class="instruction-item"><div class="instruction-number">2</div><p>Olhe para frente</p></div>
                <div class="instruction-item"><div class="instruction-number">3</div><p>Boa iluminação</p></div>
                <div class="instruction-item"><div class="instruction-number">4</div><p>Sem acessórios</p></div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/reconhecimento.js') }}"></script>

</body>
</html>
