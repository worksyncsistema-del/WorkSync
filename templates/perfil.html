<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil — WorkSync</title>

  <!-- Fonte Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!--Dark-mode-->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/menu.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-mode.css') }}">

  <!-- CSS Global (SEMPRE PRIMEIRO) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/worksync-global.css') }}">
  <!-- CSS Específico -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/perfil.css') }}">
</head>

<body>

  <div class="perfil-page">

    <!-- DADOS PESSOAIS -->
    <section class="card">
      <h3>Dados Pessoais</h3>

      <div class="dados-pessoais">
        <div class="foto">Foto</div>

        <div class="campos">
          <div class="campo">
            <label>Nome</label>
            <input type="text" id="nome" value="{{ user.nome }}" readonly>
          </div>

          <div class="campo">
            <label>Email</label>
            <input type="email" id="email" value="{{ user.email }}" readonly>
          </div>

          <div class="campo">
            <label>Telefone</label>
            <input type="text" id="telefone" value="{{ user.telefone }}" readonly>
          </div>

          <div class="campo">
            <label>CPF</label>
            <input type="text" id="cpf" value="{{ user.cpf }}" readonly>
          </div>
        </div>
      </div>
    </section>

    <!-- DADOS DO TRABALHADOR -->
    <section class="card">
      <h3>Dados do Trabalhador</h3>

      <div class="grid">
        <div class="campo">
          <label>Cargo</label>
          <input type="text" id="cargo" disabled>
        </div>

        <div class="campo">
          <label>Setor</label>
          <input type="text" id="setor" disabled>
        </div>

        <div class="campo">
          <label>Tipo de Perfil</label>
          <input type="text" id="tipo_perfil" disabled>
        </div>

        <div class="campo">
          <label>Matrícula / ID</label>
          <input type="text" id="matricula" disabled>
        </div>

        <div class="campo">
          <label>Data de Admissão</label>
          <input type="text" id="data_admissao" disabled>
        </div>

        <div class="campo">
          <label>Tipo de Contrato</label>
          <input type="text" id="tipo_contrato" disabled>
        </div>

        <div class="campo">
          <label>Carga Horária</label>
          <input type="text" id="carga_horaria" disabled>
        </div>

        <div class="campo">
          <label>Jornada Padrão</label>
          <input type="text" id="jornada_padrao" disabled>
        </div>
      </div>
    </section>

  </div>

  <script src="{{ url_for('static', filename='js/perfil.js') }}"></script>

</body>

</html>
