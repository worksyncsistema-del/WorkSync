<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Meu Perfil</title>

  <!-- Fonte Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/perfil.css">
</head>

<body>

  <div class="perfil-page">

    <!-- DADOS PESSOAIS -->
    <section class="card">
      <h3>Dados Pessoais</h3>

      <div class="dados-pessoais">
        <div class="foto">FOTO</div>

        <div class="campos">
          <div class="campo">
            <label>Nome</label>
            <input type="text" disabled>
          </div>

          <div class="campo">
            <label>Email</label>
            <input type="text" disabled>
          </div>

          <div class="campo">
            <label>Telefone</label>
            <input type="text" disabled>
          </div>

          <div class="campo">
            <label>CPF</label>
            <input type="text" disabled>
          </div>
        </div>
      </div>
    </section>

    <!-- DADOS DO TRABALHADOR -->
    <section class="card">
      <h3>Dados do Trabalhador</h3>

      <div class="grid">
        <div class="campo">
          <label>Cargo</label>
          <input type="text" disabled>
        </div>

        <div class="campo">
          <label>Setor</label>
          <input type="text" disabled>
        </div>

        <div class="campo">
          <label>Tipo de perfil</label>
          <input type="text" disabled>
        </div>

        <div class="campo">
          <label>Matrícula / ID</label>
          <input type="text" disabled>
        </div>

        <div class="campo">
          <label>Data de admissão</label>
          <input type="text" disabled>
        </div>

        <div class="campo">
          <label>Tipo de contrato</label>
          <input type="text" disabled>
        </div>

        <div class="campo">
          <label>Carga horária</label>
          <input type="text" disabled>
        </div>

        <div class="campo">
          <label>Jornada padrão</label>
          <input type="text" disabled>
        </div>
      </div>
    </section>

    <!-- AÇÕES -->
    <div class="acoes">
      <button class="btn-senha" onclick="window.top.location.href='recup.html'">Redefinir senha</button>
    </div>

  </div>
</body>

</html>
