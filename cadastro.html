  <div class="perfil-page">

    <!-- DADOS PESSOAIS -->

    </section>

    <!-- DADOS DO TRABALHADOR -->
    <section class="card">
  <h3>Dados do Trabalhador</h3>

  <div class="grid">

    <div class="campo">
      <label>Cargo</label>
      <select>
        <option value="">Selecione</option>
        <option>Analista</option>
        <option>Assistente</option>
        <option>Gerente</option>
        <option>Coordenador</option>
      </select>
    </div>

    <div class="campo">
      <label>Setor</label>

        <option value="">Selecione</option>
        <option>RH</option>
        <option>Financeiro</option>
        <option>TI</option>
        <option>Comercial</option>
      </select>
    </div>

    <div class="campo">
      <label>Tipo de perfil</label>

        <option value="">Selecione</option>
        <option>Administrador</option>
        <option>Gestor</option>
        <option>Colaborador</option>
      </select>
    </div>

    <div class="campo">
      <label>Tipo de contrato</label>
      <select>
        <option value="">Selecione</option>
        <option>CLT</option>
        <option>PJ</option>
        <option>Estágio</option>
        <option>Temporário</option>
      </select>
    </div>

    <div class="campo">
      <label>Data de admissão</label>
      <input type="date">
    </div>

    <div class="campo">
      <label>Carga horária semanal</label>
      <input type="text">
    </div>

  </div>
</section>

<section class="card">

    </div>

    <label>início - Expediente</label>

  </div>

  </div>

  </div>

</div>

<script>
    function toggleDia(id) {
  const dia = document.getElementById(id);

  if (dia.style.display === "none") {
    dia.style.display = "grid";
  } else {
    dia.style.display = "none";
  }
}
function alternarJornada() {
  const tipo = document.getElementById("tipoJornada").value;

  const padrao = document.getElementById("jornadaPadrao");
  const manual = document.getElementById("jornadaManual");

  if (tipo === "padrao") {
    padrao.style.display = "block";
    manual.style.display = "none";
  } else {
    padrao.style.display = "none";
    manual.style.display = "block";
  }
}
</script>
